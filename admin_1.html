<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ContractSense — Base de connaissances</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0a0c12; color: #e2e5f0; font-family: system-ui, sans-serif; min-height: 100vh; }
@keyframes spin { to { transform: rotate(360deg); } }
.wrap { max-width: 820px; margin: 0 auto; padding: 36px 20px 80px; }
.logo { display: flex; align-items: center; gap: 9px; font-weight: 800; font-size: 19px; margin-bottom: 8px; }
.dot { width: 9px; height: 9px; border-radius: 50%; background: #5b7cfa; box-shadow: 0 0 14px #5b7cfa; }
.subtitle { color: #6b7280; font-size: 13px; margin-bottom: 40px; }
.card { background: #111420; border: 1px solid #1f2537; border-radius: 14px; padding: 24px; margin-bottom: 20px; }
.card-title { font-weight: 700; font-size: 16px; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
label { display: block; font-size: 11px; color: #6b7280; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
input, select { width: 100%; background: #181c2a; border: 1px solid #1f2537; border-radius: 9px; padding: 10px 13px; color: #e2e5f0; font-size: 13px; font-family: inherit; margin-bottom: 14px; }
input:focus, select:focus { outline: none; border-color: #5b7cfa; }
select { appearance: none; }
.btn { padding: 10px 20px; background: #5b7cfa; border: none; border-radius: 9px; color: #fff; font-size: 13px; font-weight: 600; cursor: pointer; }
.btn:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-danger { background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.3); color: #ef4444; padding: 6px 12px; border-radius: 7px; font-size: 12px; cursor: pointer; }
.drop { border: 1.5px dashed #1f2537; border-radius: 12px; padding: 32px 24px; text-align: center; cursor: pointer; background: #111420; margin-bottom: 14px; transition: all 0.2s; }
.drop:hover { border-color: #5b7cfa; background: rgba(91,124,250,0.05); }
.file-ok { display: flex; align-items: center; gap: 9px; background: rgba(16,185,129,0.08); border: 1px solid rgba(16,185,129,0.3); border-radius: 9px; padding: 10px 14px; margin-bottom: 14px; font-size: 13px; }
.success { background: rgba(16,185,129,0.08); border: 1px solid rgba(16,185,129,0.3); border-radius: 9px; padding: 12px 16px; color: #10b981; font-size: 13px; margin-top: 12px; }
.error { background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.25); border-radius: 9px; padding: 12px 16px; color: #ef4444; font-size: 13px; margin-top: 12px; }
.spinner-sm { width: 16px; height: 16px; border: 2px solid #1f2537; border-top-color: #5b7cfa; border-radius: 50%; animation: spin 0.8s linear infinite; display: inline-block; margin-right: 8px; vertical-align: middle; }
.doc-item { display: flex; justify-content: space-between; align-items: center; padding: 14px 16px; background: #181c2a; border-radius: 10px; margin-bottom: 8px; }
.doc-info .name { font-weight: 600; font-size: 14px; margin-bottom: 3px; }
.doc-info .meta { color: #6b7280; font-size: 12px; }
.type-badge { padding: 3px 9px; border-radius: 20px; font-size: 11px; margin-right: 8px; }
.type-law { background: rgba(91,124,250,0.15); color: #5b7cfa; }
.type-contract { background: rgba(16,185,129,0.15); color: #10b981; }
.type-jurisprudence { background: rgba(245,158,11,0.15); color: #f59e0b; }
.type-doctrine { background: rgba(139,92,246,0.15); color: #8b5cf6; }
.stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-bottom: 20px; }
.stat-box { background: #181c2a; border-radius: 10px; padding: 16px; text-align: center; }
.stat-box .num { font-size: 24px; font-weight: 800; color: #5b7cfa; }
.stat-box .lbl { font-size: 12px; color: #6b7280; margin-top: 4px; }
.empty { text-align: center; color: #6b7280; padding: 32px; font-size: 14px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="logo"><div class="dot"></div>ContractSense</div>
  <div class="subtitle">⚙️ Administration — Base de connaissances juridiques</div>

  <!-- API Key -->
  <div class="card" id="key-section">
    <div class="card-title">🔑 Clé API</div>
    <label>Clé API Anthropic</label>
    <div style="display:grid;grid-template-columns:1fr auto;gap:8px">
      <input type="password" id="api-key" placeholder="sk-ant-..."/>
      <button class="btn" onclick="saveKey()">Sauver</button>
    </div>
    <div id="key-status" style="display:none" class="success">✅ Clé connectée — <a href="#" onclick="changeKey()" style="color:#10b981">Changer</a></div>
  </div>

  <!-- Stats -->
  <div class="stats" id="stats-section" style="display:none">
    <div class="stat-box"><div class="num" id="stat-total">0</div><div class="lbl">Chunks indexés</div></div>
    <div class="stat-box"><div class="num" id="stat-docs">0</div><div class="lbl">Documents</div></div>
    <div class="stat-box"><div class="num" id="stat-status">✅</div><div class="lbl">Statut RAG</div></div>
  </div>

  <!-- Upload -->
  <div class="card" id="upload-section" style="display:none">
    <div class="card-title">📄 Ajouter un document</div>

    <label>Type de document</label>
    <select id="doc-type">
      <option value="law">📚 Code de loi / Texte législatif</option>
      <option value="contract">📝 Modèle de contrat</option>
      <option value="jurisprudence">⚖️ Jurisprudence</option>
      <option value="doctrine">📖 Doctrine / Article juridique</option>
    </select>

    <label>Nom / Référence</label>
    <input type="text" id="source-name" placeholder="Ex: Code des Obligations et Contrats — Art. 230-350"/>

    <div class="drop" id="drop-area" onclick="document.getElementById('file-input').click()">
      <div style="font-size:24px;margin-bottom:8px">📄</div>
      <div style="font-weight:700;font-size:14px;margin-bottom:4px">Déposez votre document ici</div>
      <div style="color:#6b7280;font-size:13px">DOCX ou TXT uniquement</div>
    </div>
    <input type="file" id="file-input" accept=".docx,.txt,.doc" style="display:none" onchange="setFile(this.files[0])"/>
    <div id="file-ok" style="display:none" class="file-ok">
      <span>✅</span>
      <span id="file-name" style="color:#10b981;font-size:13px"></span>
    </div>

    <button class="btn" id="btn-upload" onclick="uploadDoc()" style="width:100%">⬆ Indexer le document</button>
    <div id="upload-msg" style="display:none"></div>
  </div>

  <!-- Documents list -->
  <div class="card" id="docs-section" style="display:none">
    <div class="card-title">📚 Documents indexés</div>
    <div id="docs-list"><div class="empty">Chargement…</div></div>
  </div>

  <div style="text-align:center;margin-top:24px">
    <a href="contractsense_24.html" style="color:#6b7280;font-size:13px;text-decoration:none">← Retour à ContractSense</a>
  </div>
</div>

<script>
var BACKEND = 'https://web-production-f96f7.up.railway.app';
var apiKey = '';
var curFile = null;

var TYPE_LABELS = {
  law: 'Code de loi',
  contract: 'Modèle contrat',
  jurisprudence: 'Jurisprudence',
  doctrine: 'Doctrine'
};

document.addEventListener('DOMContentLoaded', function() {
  var saved = localStorage.getItem('cs_key');
  if (saved && saved.indexOf('sk-') === 0) {
    apiKey = saved;
    document.getElementById('api-key').value = saved;
    showConnected();
    loadStats();
    loadDocs();
  }

  var drop = document.getElementById('drop-area');
  drop.addEventListener('dragover', function(e) { e.preventDefault(); drop.style.borderColor = '#5b7cfa'; });
  drop.addEventListener('dragleave', function() { drop.style.borderColor = '#1f2537'; });
  drop.addEventListener('drop', function(e) { e.preventDefault(); drop.style.borderColor = '#1f2537'; setFile(e.dataTransfer.files[0]); });
});

function saveKey() {
  var k = document.getElementById('api-key').value.trim();
  if (!k || k.indexOf('sk-') !== 0) { alert('Clé invalide'); return; }
  apiKey = k;
  localStorage.setItem('cs_key', k);
  showConnected();
  loadStats();
  loadDocs();
}

function changeKey() {
  apiKey = '';
  localStorage.removeItem('cs_key');
  document.getElementById('key-status').style.display = 'none';
  document.getElementById('api-key').value = '';
  document.getElementById('upload-section').style.display = 'none';
  document.getElementById('docs-section').style.display = 'none';
  document.getElementById('stats-section').style.display = 'none';
}

function showConnected() {
  document.getElementById('key-status').style.display = 'block';
  document.getElementById('upload-section').style.display = 'block';
  document.getElementById('docs-section').style.display = 'block';
  document.getElementById('stats-section').style.display = 'grid';
}

function setFile(f) {
  if (!f) return;
  curFile = f;
  document.getElementById('file-name').textContent = f.name + ' (' + (f.size/1024).toFixed(0) + ' KB)';
  document.getElementById('file-ok').style.display = 'flex';
  if (!document.getElementById('source-name').value) {
    document.getElementById('source-name').value = f.name.replace(/\.[^.]+$/, '');
  }
}

async function loadStats() {
  try {
    var resp = await fetch(BACKEND + '/health');
    var data = await resp.json();
    document.getElementById('stat-total').textContent = data.rag_docs || 0;
  } catch(e) {}

  try {
    var resp2 = await fetch(BACKEND + '/rag/list');
    var data2 = await resp2.json();
    document.getElementById('stat-docs').textContent = (data2.documents || []).length;
  } catch(e) {}
}

async function loadDocs() {
  var list = document.getElementById('docs-list');
  try {
    var resp = await fetch(BACKEND + '/rag/list');
    var data = await resp.json();
    var docs = data.documents || [];

    if (docs.length === 0) {
      list.innerHTML = '<div class="empty">Aucun document indexé.<br/>Ajoutez des codes de loi, modèles de contrats ou jurisprudence.</div>';
      return;
    }

    list.innerHTML = '';
    docs.forEach(function(doc) {
      var typeClass = 'type-' + (doc.type || 'law');
      var div = document.createElement('div');
      div.className = 'doc-item';
      div.innerHTML =
        '<div class="doc-info">' +
          '<div class="name">' +
            '<span class="type-badge ' + typeClass + '">' + (TYPE_LABELS[doc.type] || doc.type) + '</span>' +
            doc.source +
          '</div>' +
          '<div class="meta">' + doc.chunks + ' chunks indexés</div>' +
        '</div>' +
        '<button class="btn-danger" onclick="deleteDoc(\'' + doc.source.replace(/'/g, "\\'") + '\', this)">🗑 Supprimer</button>';
      list.appendChild(div);
    });
  } catch(e) {
    list.innerHTML = '<div class="empty" style="color:#ef4444">Erreur de connexion au serveur</div>';
  }
}

async function uploadDoc() {
  if (!curFile) { alert('Sélectionne un fichier.'); return; }
  var sourceName = document.getElementById('source-name').value.trim();
  if (!sourceName) { alert('Donne un nom au document.'); return; }

  var btn = document.getElementById('btn-upload');
  var msg = document.getElementById('upload-msg');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner-sm"></span>Indexation en cours…';
  msg.style.display = 'none';

  try {
    var fd = new FormData();
    fd.append('file', curFile);
    fd.append('doc_type', document.getElementById('doc-type').value);
    fd.append('source_name', sourceName);
    fd.append('api_key', apiKey);

    var resp = await fetch(BACKEND + '/rag/upload', { method: 'POST', body: fd });
    var data = await resp.json();

    if (!resp.ok) throw new Error(data.error);

    msg.className = 'success';
    msg.textContent = '✅ ' + data.chunks + ' chunks indexés pour "' + data.source + '" (total: ' + data.total_docs + ' chunks)';
    msg.style.display = 'block';

    curFile = null;
    document.getElementById('file-ok').style.display = 'none';
    document.getElementById('source-name').value = '';
    document.getElementById('file-input').value = '';

    loadStats();
    loadDocs();
  } catch(e) {
    msg.className = 'error';
    msg.textContent = '⚠ ' + (e.message || 'Erreur inattendue');
    msg.style.display = 'block';
  } finally {
    btn.disabled = false;
    btn.textContent = '⬆ Indexer le document';
  }
}

async function deleteDoc(source, btn) {
  if (!confirm('Supprimer "' + source + '" de la base ?')) return;
  btn.disabled = true;
  try {
    var resp = await fetch(BACKEND + '/rag/delete', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({source: source})
    });
    var data = await resp.json();
    if (!resp.ok) throw new Error(data.error);
    loadStats();
    loadDocs();
  } catch(e) {
    alert('Erreur: ' + e.message);
    btn.disabled = false;
  }
}
</script>
</body>
</html>
